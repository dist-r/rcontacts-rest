openapi: 3.0.3
info:
  title: Rcontacts REST API
  version: 2.0.0
  description: API documentation for Rcontacts REST API v2.

servers:
  - url: http://localhost:3000/api/v2
    description: Local Development Server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User profile endpoints
  - name: Contacts
    description: Contact management endpoints

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        message:
          type: string
          example: "Request processed successfully"
        success:
          type: boolean
          example: true
        data:
          nullable: true
      required:
        - message
        - success
        - data

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            message:
              type: string
              example: "Invalid request body"
            success:
              type: boolean
              example: false
            data:
              nullable: true
              example: null

    User:
      type: object
      properties:
        id:
          type: string
          example: "5bb3f34b-4d8c-4c9d-9ac7-2df18d4db7ff"
        username:
          type: string
          example: "john.doe"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john.doe@example.com"
      required:
        - id
        - username
        - name
        - email

    Contact:
      type: object
      properties:
        id:
          type: string
          example: "a8c6d879-2ef9-4b8a-9d58-6a87957ed8fd"
        userId:
          type: string
          example: "5bb3f34b-4d8c-4c9d-9ac7-2df18d4db7ff"
        name:
          type: string
          example: "Jane Doe"
        email:
          type: string
          format: email
          example: "jane.doe@example.com"
        phone:
          type: string
          example: "+6281234567890"
      required:
        - id
        - userId
        - name
        - email
        - phone

    RegisterRequest:
      type: object
      properties:
        username:
          type: string
          example: "newuser"
        name:
          type: string
          example: "New User"
        email:
          type: string
          format: email
          example: "newuser@example.com"
        password:
          type: string
          format: password
          example: "securepassword123"
      required:
        - username
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        password:
          type: string
          format: password
          example: "securepassword123"
      required:
        - email
        - password

    AuthToken:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      required:
        - token

    CreateContactRequest:
      type: object
      properties:
        name:
          type: string
          example: "Alice Smith"
        email:
          type: string
          format: email
          example: "alice.smith@example.com"
        phone:
          type: string
          example: "+6289876543210"
      required:
        - name
        - email
        - phone

    UpdateContactRequest:
      type: object
      properties:
        name:
          type: string
          example: "Alice Smith Updated"
        email:
          type: string
          format: email
          example: "alice.updated@example.com"
        phone:
          type: string
          example: "+6289876543210"
      minProperties: 1

    UserResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/User"

    LoginResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/AuthToken"

    ContactResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Contact"

    ContactListResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/Contact"

    DeleteContactResponse:
      allOf:
        - $ref: "#/components/schemas/ApiResponse"
        - type: object
          properties:
            message:
              type: string
              example: "Contact deleted successfully"
            success:
              type: boolean
              example: true
            data:
              nullable: true
              example: null

paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
              example:
                message: "User registered successfully"
                success: true
                data:
                  id: "5bb3f34b-4d8c-4c9d-9ac7-2df18d4db7ff"
                  username: "newuser"
                  name: "New User"
                  email: "newuser@example.com"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
              example:
                message: "User logged in successfully"
                success: true
                data:
                  token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/profile:
    get:
      tags:
        - Users
      summary: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
              example:
                message: "User profile retrieved successfully"
                success: true
                data:
                  id: "5bb3f34b-4d8c-4c9d-9ac7-2df18d4db7ff"
                  username: "john.doe"
                  name: "John Doe"
                  email: "john.doe@example.com"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contacts:
    get:
      tags:
        - Contacts
      summary: Get all contacts for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Contacts retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactListResponse"
              example:
                message: "Contacts retrieved successfully"
                success: true
                data:
                  - id: "a8c6d879-2ef9-4b8a-9d58-6a87957ed8fd"
                    userId: "5bb3f34b-4d8c-4c9d-9ac7-2df18d4db7ff"
                    name: "Jane Doe"
                    email: "jane.doe@example.com"
                    phone: "+6281234567890"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      tags:
        - Contacts
      summary: Create a new contact
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactRequest"
      responses:
        "201":
          description: Contact created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
              example:
                message: "Contact created successfully"
                success: true
                data:
                  id: "a8c6d879-2ef9-4b8a-9d58-6a87957ed8fd"
                  userId: "5bb3f34b-4d8c-4c9d-9ac7-2df18d4db7ff"
                  name: "Alice Smith"
                  email: "alice.smith@example.com"
                  phone: "+6289876543210"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contacts/{id}:
    put:
      tags:
        - Contacts
      summary: Update a contact by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the contact to update
          schema:
            type: string
            example: "a8c6d879-2ef9-4b8a-9d58-6a87957ed8fd"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContactRequest"
      responses:
        "200":
          description: Contact updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactResponse"
              example:
                message: "Contact updated successfully"
                success: true
                data:
                  id: "a8c6d879-2ef9-4b8a-9d58-6a87957ed8fd"
                  userId: "5bb3f34b-4d8c-4c9d-9ac7-2df18d4db7ff"
                  name: "Alice Smith Updated"
                  email: "alice.updated@example.com"
                  phone: "+6289876543210"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags:
        - Contacts
      summary: Delete a contact by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the contact to delete
          schema:
            type: string
            example: "a8c6d879-2ef9-4b8a-9d58-6a87957ed8fd"
      responses:
        "200":
          description: Contact deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteContactResponse"
              example:
                message: "Contact deleted successfully"
                success: true
                data: null
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Contact not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
