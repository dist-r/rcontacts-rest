spring.application.name=contactapp
server.port=3000

# DEFAULT POSTGRES
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/pgdb}
spring.datasource.username=pgdb
spring.datasource.password=pgdb
spring.datasource.driver-class-name=org.postgresql.Driver

# UNCOMENT IF YOU CHOOSE MYSQL
# spring.datasource.url=jdbc:mysql://localhost:3306/mysqldb
# spring.datasource.username=mysqldb
# spring.datasource.password=mysqldb


spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

jwt.secret=super-secret-key-yang-panjang-minimal-32-char